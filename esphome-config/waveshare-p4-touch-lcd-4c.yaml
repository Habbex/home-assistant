## TOUCHSCREEN CONFIG
touchscreen:
  - platform: gt911
    id: touchscreen_
    on_touch:
      - logger.log:
          format: "Touch at %d/%d"
          args: [touch.x, touch.y]

# ## PANEL BACKLIGHT CONFIG
# output:
#   - platform: ledc
#     id: backlight_
#     pin: GPIO26
#     frequency: 100Hz
#     inverted: true
#     min_power: 0.1
#     max_power: 1.0

# Configure the Backlight Pin
output:
  - platform: ledc
    id: backlight_
    pin: GPIO26
    frequency: 1000Hz
    inverted: true
    min_power: 0.25
    max_power: 1.0

light:
  - platform: monochromatic
    name: "backlight"
    output: backlight_
    id: backlight_light
    restore_mode: ALWAYS_ON

