## MIPI DSI CONFIG
esp_ldo:
  - channel: 3
    voltage: 2.5V

display:
  - platform: mipi_dsi
    id: my_display
    model: WAVESHARE-P4-TOUCH-3.4C
    pixel_mode: 16bit
    color_depth: 16
    

image:
