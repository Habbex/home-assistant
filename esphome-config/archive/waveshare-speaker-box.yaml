substitutions:
  device_name: p4-34c-panel
  friendly_name: "P4 3.4C Panel"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false

external_components:
  - source: github://pr#11886
    components: [mipi_dsi]
    refresh: 1h

esp32:
  board: esp32-p4-evboard
  flash_size: 32MB
  cpu_frequency: 400MHz
  framework:
    type: esp-idf
    # This matches the known-working pattern used on other Waveshare P4 boards
    platform_version: https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
    version: 5.4.2
    advanced:
      enable_idf_experimental_features: yes

logger:
  level: DEBUG
  hardware_uart: UART0

psram:
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V


api:

ota:
  - platform: esphome

# ESP32-C6 "hosted" WiFi/BLE coprocessor wiring (from Waveshare schematic)
esp32_hosted:
  active_high: true
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "${friendly_name} Fallback"
captive_portal:

# Waveshare wiki states: SCL(GPIO8), SDA(GPIO7)
i2c:
  id: i2c_bus
  sda: GPIO7
  scl: GPIO8
  frequency: 400kHz
  scan: true

# ---- Display (MIPI-DSI) ----
display:
  - platform: mipi_dsi
    model: WAVESHARE-P4-86-PANEL


# ---- Backlight (best-guess default) ----
# Many Waveshare P4 panels use a GPIO backlight enable/PWM.
# If you don’t get light, you’ll need to confirm the exact BL pin in the schematic.
output:
  - platform: ledc
    id: backlight_pwm
    pin: GPIO26
    frequency: 1000Hz
    # flip to false if brightness is inverted
    inverted: true
    min_power: 0.1
    max_power: 0.8

light:
  - platform: monochromatic
    id: backlight
    name: "${friendly_name} Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON


