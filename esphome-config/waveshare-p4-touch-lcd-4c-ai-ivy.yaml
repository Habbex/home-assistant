esphome:
  name: waveshare-34-ai-ivy
  friendly_name: WaveShare P4 Touch LCD 4 AI
  name_add_mac_suffix: false
  on_boot:
      priority: -100
      then:
        - lvgl.label.update:
            id: boot_label
            text: "Hardware Initialized..."
        - delay: 1s

        # Wait for WiFi (milestone 1)
        - wait_until:
            wifi.connected:
        - lvgl.label.update:
            id: boot_label
            text: "WiFi: Connected"
        - delay: 800ms

        # Wait for Home Assistant (milestone 2)
        - wait_until:
            api.connected:
        - lvgl.label.update:
            id: boot_label
            text: "Home Assistant: Linked"
        - delay: 800ms

        # THE JUMPSTART FIX:
        # Force the engine to cycle ONCE to clear the I2S/SDIO buffers
        - lvgl.label.update:
            id: boot_label
            text: "Starting Duplex Audio..."
        - micro_wake_word.stop
        - globals.set:
            id: wake_word_running
            value: 'false'
        - delay: 500ms
        - script.execute: safe_wake_word_start

        # Now we wait for the system to settle into the detecting state
        - lvgl.label.update:
            id: boot_label
            text: "AEC & Wake Word: OK"
        - delay: 1.5s

        # FINISH: Hide boot, reveal Ivy, then start the idle timer
        - lvgl.widget.update:
            id: boot_screen
            hidden: true
        - lvgl.widget.update:
            id: main_screen
            hidden: false
        # Only start the idle timer AFTER the screen is visible
        - script.execute: screen_idle_timer


esp32:
  board: esp32-p4
  flash_size: 32Mb
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: yes
    sdkconfig_options:
          CONFIG_ESP_SYSTEM_PANIC_PRINT_HALT: y

logger:
  level: INFO
  hardware_uart: UART0

# Enable Home Assistant API
api:
  encryption:
    key: !secret waveshare_api
  on_client_connected:
      - lvgl.label.update:
          id: boot_label
          text: "Home Assistant Linked..."

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  on_connect:
      - lvgl.label.update:
          id: boot_label
          text: "WiFi Connected..."
  ap:
    ssid: "Esp32-P4-Touch-Lcd-4C"
    password: !secret ap_pwd

esp32_hosted:
  active_high: true
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17

i2c:
  sda: GPIO7
  scl: GPIO8
  scan: false
  id: internal_i2c

switch:
  - platform: gpio
    pin: GPIO53
    id: pa_ctrl
    restore_mode: ALWAYS_ON

  - platform: template
    name: "Enable Wake Word"
    id: wake_word_toggle
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - script.execute: safe_wake_word_start
      - logger.log: "Wake word ENABLED via Home Assistant"
    turn_off_action:
      - script.execute: safe_wake_word_stop
      - logger.log: "Wake word MUTED via Home Assistant"

external_components:
  - source: github://n-IA-hane/intercom-api
    components: [i2s_audio_duplex, esp_aec]

audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: internal_i2c
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 16000
    use_mclk: true
    mic_gain: 24DB

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: internal_i2c
    address: 0x40
    bits_per_sample: 16bit
    sample_rate: 16000
    mic_gain: 24dB

esp_aec:
  id: aec_processor
  sample_rate: 16000
  mode: voip_high_perf
  filter_length: 4

i2s_audio_duplex:
  id: i2s_duplex
  i2s_lrclk_pin: GPIO10
  i2s_bclk_pin: GPIO12
  i2s_mclk_pin: GPIO13
  i2s_din_pin: GPIO11
  i2s_dout_pin: GPIO9
  sample_rate: 16000
  output_sample_rate: 16000
  aec_id: aec_processor
  use_stereo_aec_reference: true
  aec_reference_delay_ms: 200

microphone:
  - platform: i2s_audio_duplex
    id: mic_raw
    i2s_audio_duplex_id: i2s_duplex
    pre_aec: true

  - platform: i2s_audio_duplex
    id: mic_aec
    i2s_audio_duplex_id: i2s_duplex

speaker:
  - platform: i2s_audio_duplex
    id: hw_speaker
    i2s_audio_duplex_id: i2s_duplex
    sample_rate: 16000

  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 1
    source_speakers:
      - id: va_speaker_mix
        timeout: 500ms
      - id: media_speaker_mix
        timeout: 500ms

  - platform: resampler
    id: music_resampler
    output_speaker: media_speaker_mix
    sample_rate: 16000
    num_channels: 1

psram:
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V

# ---- Track metadata from Home Assistant ----
# SpeakerMediaPlayer does not expose media_title/media_artist as public
# members — pulling them from HA via text_sensor is the correct approach.
#
# IMPORTANT: check your HA entity ID matches. It is typically auto-generated
# as: media_player.<friendly_device_name>_media_player (spaces→underscores,
# all lowercase). For this device "WaveShare P4 Touch LCD 4 AI" + "Media Player"
# → media_player.waveshare_p4_touch_lcd_4_ai_media_player
# Verify in HA → Settings → Devices & Services → your ESPHome device.
text_sensor:
  - platform: homeassistant
    id: ha_media_title
    entity_id: media_player.waveshare_p4_touch_lcd_4_ai_media_player
    attribute: media_title
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(va_speaking);'
            then:
              - lvgl.label.update:
                  id: now_playing_title
                  text: !lambda |
                    return x.empty() ? std::string("Now Playing") : x;
              - script.execute: update_now_playing

  - platform: homeassistant
    id: ha_media_artist
    entity_id: media_player.waveshare_p4_touch_lcd_4_ai_media_player
    attribute: media_artist
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(va_speaking);'
            then:
              - lvgl.label.update:
                  id: now_playing_artist
                  text: !lambda |
                    return x.empty() ? std::string(" ") : x;


# ---- Media player ----
media_player:
  - platform: speaker
    id: board_player
    name: "Media Player"
    codec_support_enabled: true
    volume_min: 0.2
    volume_max: 0.8
    volume_increment: 0.05
    buffer_size: 512000

    on_play:
      - logger.log: "Audio playing!"
      - if:
          condition:
            lambda: 'return !id(va_speaking);'
          then:
            - script.execute: update_now_playing
          else:
            - logger.log: "on_play suppressed — VA is speaking"
      - delay: 500ms
      - script.execute: safe_wake_word_start
      - media_player.volume_set:
          id: board_player
          volume: !lambda "return id(music_volume_slider).state;"

    announcement_pipeline:
          speaker: va_speaker_mix
          format: FLAC
          sample_rate: 16000
          num_channels: 1

    media_pipeline:
          speaker: music_resampler
          format: MP3
          sample_rate: 44100
          num_channels: 2

    on_idle:
      - logger.log: "Media player idle"
      - media_player.volume_set:
          id: board_player
          volume: !lambda "return id(va_volume_slider).state;"
      - delay: 4s
      - script.execute: restart_wakeword_safely


# ---- Wake Word ----
micro_wake_word:
  id: my_wake_word
  microphone:
    microphone: mic_raw
    gain_factor: 6
  stop_after_detection: false
  models:
    - model: hey_jarvis
      probability_cutoff: 0.45
      sliding_window_size: 6
  vad:
    model: github://esphome/micro-wake-word-models/models/v2/vad.json
    probability_cutoff: 0.50
    sliding_window_size: 6

  on_wake_word_detected:
    then:
      - light.turn_on: screen_backlight
      - script.execute: screen_idle_timer
      - globals.set:
          id: was_playing_media
          value: !lambda "return id(board_player).state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING;"
      - if:
          condition:
            media_player.is_playing:
              id: board_player
          then:
            - media_player.stop: board_player
            # SDIO CRASH FIX: 1200ms lets the SDIO DMA buffer pool fully drain
            # before switching direction (RX stream → TX STT audio).
            # Both crashes (sdio_rx_get_buffer:896 and transport_drv_sta_tx:290)
            # were null buffer pointer asserts caused by switching too fast.
            - delay: 1200ms
      - voice_assistant.stop
      - logger.log:
          format: "Wake word detected: %s"
          args: ["wake_word.c_str()"]
      - script.execute:
          id: set_anim_state
          target_state: 1
      - script.execute: safe_wake_word_stop
      - delay: 200ms
      - voice_assistant.start:
          wake_word: !lambda return wake_word;


# Global flags
globals:
  - id: was_playing_media
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: wake_word_running
    type: bool
    restore_value: false
    initial_value: 'false'

  # 0=idle  1=listening  2=processing  3=replying(TTS)  4=media playing
  - id: current_anim_state
    type: int
    restore_value: false
    initial_value: '0'

  # True while VA is playing a TTS response
  - id: va_speaking
    type: bool
    restore_value: false
    initial_value: 'false'


# ---- Voice Assistant ----
voice_assistant:
  microphone:
    microphone: mic_aec
    gain_factor: 8
  media_player: board_player
  noise_suppression_level: 0
  auto_gain: 31dBFS
  volume_multiplier: 2.0

  on_client_connected:
    - logger.log: "Voice Assistant connected to Home Assistant"
    - script.execute: restart_wakeword_safely

  on_client_disconnected:
    - logger.log: "Voice Assistant disconnected from Home Assistant"
    - script.execute: safe_wake_word_stop
    - script.execute:
        id: set_anim_state
        target_state: 0

  on_wake_word_detected:
    - logger.log: "VA wake word detected - pipeline stopping"

  on_listening:
    - logger.log: "Mic is listening"
    - script.execute:
        id: set_anim_state
        target_state: 1

  on_stt_end:
    - script.execute: pipeline_watchdog
    - logger.log:
        format: "STT heard: %s"
        args: ["x.c_str()"]
    - script.execute:
        id: set_anim_state
        target_state: 2

  on_tts_start:
    - script.stop: pipeline_watchdog
    - globals.set:
        id: va_speaking
        value: 'true'
    - media_player.volume_set:
        id: board_player
        volume: !lambda "return id(va_volume_slider).state;"
    - logger.log:
        format: "TTS text: %s"
        args: ["x.c_str()"]
    - script.execute:
        id: set_anim_state
        target_state: 3

  on_end:
    - script.execute: screen_idle_timer
    - globals.set:
        id: va_speaking
        value: 'false'
    - media_player.volume_set:
        id: board_player
        volume: !lambda "return id(va_volume_slider).state;"
    - script.execute:
        id: set_anim_state
        target_state: 0
    # SDIO CRASH FIX: settle time before HA can push a new media stream
    - delay: 800ms
    - script.execute: restart_wakeword_safely

  on_error:
    - logger.log:
        format: "VA error %d: %s"
        args: ["code", "message.c_str()"]
    - globals.set:
        id: va_speaking
        value: 'false'
    - script.execute:
        id: set_anim_state
        target_state: 0
    - delay: 250ms
    - script.execute: restart_wakeword_safely


script:
  - id: safe_wake_word_start
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(wake_word_running);'
          then:
            - logger.log: "Wake word: starting"
            - globals.set:
                id: wake_word_running
                value: 'true'
            - micro_wake_word.start
          else:
            - logger.log: "Wake word: already running, skipping start"

  - id: safe_wake_word_stop
    mode: single
    then:
      - globals.set:
          id: wake_word_running
          value: 'false'
      - micro_wake_word.stop

  # Triggers state 4 to reveal the now-playing overlay.
  # Labels are updated directly by the text_sensor on_value callbacks
  # (ha_media_title / ha_media_artist) so they are always current.
  # on_play also calls this as a fallback in case the sensor fires
  # before the state switches.
  - id: update_now_playing
    mode: restart
    then:
      - script.execute:
          id: set_anim_state
          target_state: 4

  # States: 0=idle  1=listening  2=processing  3=replying  4=media playing
  - id: set_anim_state
    mode: single
    parameters:
      target_state: int
    then:
      - if:
          condition:
            lambda: 'return id(current_anim_state) != target_state;'
          then:
            - globals.set:
                id: current_anim_state
                value: !lambda 'return target_state;'

            - if:
                condition:
                  lambda: 'return target_state == 0;'
                then:
                  - lvgl.widget.update:
                      id: now_playing_info
                      hidden: true
                  - lvgl.animimg.update:
                      id: state_anim
                      src: [idle_01, idle_03, idle_05, idle_07, idle_09, idle_11, idle_13]
                      duration: 2600ms
                      repeat_count: forever
                      auto_start: true

            - if:
                condition:
                  lambda: 'return target_state == 1;'
                then:
                  - lvgl.widget.update:
                      id: now_playing_info
                      hidden: true
                  - lvgl.animimg.update:
                      id: state_anim
                      src: [listening_01, listening_03, listening_05, listening_07, listening_09, listening_11, listening_13]
                      duration: 2600ms
                      repeat_count: forever
                      auto_start: true

            - if:
                condition:
                  lambda: 'return target_state == 2;'
                then:
                  - lvgl.widget.update:
                      id: now_playing_info
                      hidden: true
                  - lvgl.animimg.update:
                      id: state_anim
                      src: [processing_01, processing_03, processing_05, processing_07, processing_09, processing_11, processing_13]
                      duration: 2600ms
                      repeat_count: forever
                      auto_start: true

            - if:
                condition:
                  lambda: 'return target_state == 3;'
                then:
                  - lvgl.widget.update:
                      id: now_playing_info
                      hidden: true
                  - lvgl.animimg.update:
                      id: state_anim
                      src: [replying_01, replying_03, replying_05, replying_07, replying_09, replying_11, replying_13]
                      duration: 2600ms
                      repeat_count: forever
                      auto_start: true

            - if:
                condition:
                  lambda: 'return target_state == 4;'
                then:
                  - lvgl.animimg.update:
                      id: state_anim
                      src: [replying_01, replying_03, replying_05, replying_07, replying_09, replying_11, replying_13]
                      duration: 2600ms
                      repeat_count: forever
                      auto_start: true
                  - lvgl.widget.update:
                      id: now_playing_info
                      hidden: false

  - id: restart_wakeword_safely
    mode: restart
    then:
      - delay: 4s
      - if:
          condition:
            voice_assistant.connected
          then:
            - logger.log: "Starting wake word (always-on for barge-in)"
            - script.execute: safe_wake_word_start
            - script.execute:
                id: set_anim_state
                target_state: 0
          else:
            - logger.log: "Wake word start delayed; VA not connected"
            - delay: 3s
            - script.execute: restart_wakeword_safely

  - id: screen_idle_timer
    mode: restart
    then:
      - delay: 5min
      - light.turn_off: screen_backlight
      - logger.log: "Screen idle timeout reached. Turning off display."

  - id: pipeline_watchdog
    mode: restart
    then:
      - delay: 10s
      - logger.log: "Watchdog triggered! Audio failed to load. Forcing recovery."
      - globals.set:
          id: va_speaking
          value: 'false'
      - media_player.stop: board_player
      - script.execute:
          id: set_anim_state
          target_state: 0
      - script.execute: restart_wakeword_safely


