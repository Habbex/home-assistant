psram:
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V

# ---- Media player (ESPHome entity for playback) ----
media_player:
  - platform: speaker
    id: board_player
    name: "P4 Audio"
    codec_support_enabled: true
    volume_min: 0.5
    volume_max: 0.75
    volume_increment: 0.05
    buffer_size: 16000
    on_play:
      - logger.log: "Audio playing! Triggering replying animation."
      - lvgl.animimg.update:
          id: state_anim
          src: [replying_01, replying_03] #,  replying_05, replying_07, replying_09, replying_11, replying_13]
          duration: 2600ms
          repeat_count: forever
          auto_start: true
    
    announcement_pipeline:
      speaker: media_speaker_mix
      format: FLAC
      sample_rate: 48000
      # num_channels: 1
      
    # media_pipeline:
    #   speaker:  
    #   format: FLAC
    #   # num_channels: 1
    #   sample_rate: 48000

    on_idle:
      - logger.log: "Media player idle (playback finished)"
      - script.execute: restart_wakeword_safely


# ---- Voice Assistant (uses mic + media_player for replies) ----
micro_wake_word:
  id: my_wake_word
  microphone:
    microphone: mic_raw
    gain_factor: 10
  stop_after_detection: true
  models:
    - model: hey_jarvis
      probability_cutoff: 0.35
      sliding_window_size: 3
  vad:
    model: github://esphome/micro-wake-word-models/models/v2/vad.json
    probability_cutoff: 0.45
    sliding_window_size: 5

  on_wake_word_detected:
    then:
      # WAKE THE SCREEN AND RESET THE TIMER
      - light.turn_on: screen_backlight
      - script.execute: screen_idle_timer

      - logger.log:
          format: "Wake word detected: %s"
          args: ["wake_word.c_str()"]
      - lvgl.animimg.update:
          id: state_anim
          src: [listening_01,  listening_03]#,  listening_05,  listening_07,  listening_09,  listening_11,  listening_13]
          duration: 2600ms
          repeat_count: forever
          auto_start: true
      - micro_wake_word.stop
      - voice_assistant.stop
      - delay: 250ms
      - voice_assistant.start:
          wake_word: !lambda return wake_word;

voice_assistant:
  microphone:
    microphone: mic_aec
    gain_factor: 10
    # channels: [1]
  speaker: va_speaker_mix
  noise_suppression_level: 0
  auto_gain: 31dBFS
  volume_multiplier: 2.0

  on_client_connected:
    - logger.log: "Voice Assistant connected to Home Assistant"
    - script.execute: restart_wakeword_safely

  on_client_disconnected:
    - logger.log: "Voice Assistant disconnected from Home Assistant"
    - micro_wake_word.stop
    - lvgl.animimg.update:
        id: state_anim
        src: [idle_01,  idle_03] #,  idle_05,  idle_07,  idle_09,  idle_11,  idle_13]
        duration: 2600ms
        repeat_count: forever
        auto_start: true

  on_listening:
    - logger.log: "Mic is listening"
    - lvgl.animimg.update:
        id: state_anim
        src: [listening_01,  listening_03]#,  listening_05,  listening_07,  listening_09,  listening_11,  listening_13]
        duration: 2600ms
        repeat_count: forever
        auto_start: true

  on_stt_end:
    - logger.log:
        format: "STT heard: %s"
        args: ["x.c_str()"]
    # - script.execute: pipeline_watchdog

    - lvgl.animimg.update:
          id: state_anim
          src: [processing_01,  processing_03]#,  processing_05,  processing_07,  processing_09,  processing_11, processing_13]
          duration: 2600ms
          repeat_count: forever
          auto_start: true

  on_tts_start:
    - logger.log:
        format: "TTS text: %s"
        args: ["x.c_str()"]
    - micro_wake_word.stop
    - lvgl.animimg.update:
        id: state_anim
        src: [replying_01,  replying_03]#,  replying_05, replying_07, replying_09,  replying_11,  replying_13]
        duration: 2600ms
        repeat_count: forever
        auto_start: true

  on_end:
    - script.execute: screen_idle_timer
    - lvgl.animimg.update:
        id: state_anim
        src: [idle_01,  idle_03]#,  idle_05,  idle_07,  idle_09,  idle_11,  idle_13]
        duration: 2600ms
        repeat_count: forever
        auto_start: true
    - delay: 250ms
    - script.execute: restart_wakeword_safely

  on_error:
    - logger.log:
        format: "VA error %d: %s"
        args: ["code", "message.c_str()"]
    - lvgl.animimg.update:
        id: state_anim
        src: [idle_01,  idle_03]#,  idle_05,  idle_07,  idle_09,  idle_11,  idle_13]
        duration: 2600ms
        repeat_count: forever
        auto_start: true
    - delay: 250ms
    - script.execute: restart_wakeword_safely

script:
  - id: restart_wakeword_safely
    mode: restart
    then:
      - delay: 500ms
      - if:
          condition:
            and:
              - voice_assistant.connected
              - media_player.is_idle:
                  id: board_player
          then:
            - logger.log: "Starting wake word (bus should be free)"
            - micro_wake_word.start
            - lvgl.animimg.update:
                id: state_anim
                src: [idle_01,  idle_03]#,  idle_05,  idle_07,  idle_09,  idle_11,  idle_13]
                duration: 2600ms
                repeat_count: forever
                auto_start: true
          else:
            - logger.log: "Wake word start delayed; media player not idle"
            - delay: 500ms
            - script.execute: restart_wakeword_safely
  - id: screen_idle_timer
    mode: restart
    then:
      - delay: 5min
      - light.turn_off: screen_backlight
      - logger.log: "Screen idle timeout reached. Turning off display."

  - id: pipeline_watchdog
    mode: restart
    then:
      # Give Home Assistant 10 seconds to generate and start playing the audio
      - delay: 10s 
      
      - logger.log: "Watchdog triggered! Audio failed to load. Forcing recovery."
      
      # 1. Force kill the stuck media player
      - media_player.stop: board_player
      
      # 2. Force Ivy back to her idle face
      - lvgl.animimg.update:
          id: state_anim
          src: [idle_01, idle_03]#,  idle_05,  idle_07,  idle_09,  idle_11,  idle_13]
          duration: 2600ms
          repeat_count: forever
          auto_start: true
          
      # 3. Safely reboot the microphone
      - script.execute: restart_wakeword_safely

