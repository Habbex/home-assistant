font:
  - file: "gfonts://Roboto"
    id: roboto_48
    size: 48
  - file: "gfonts://Roboto"
    id: roboto_24
    size: 24
  - file: "gfonts://Roboto"
    id: roboto_18
    size: 18

lvgl:
  displays:
    - my_display
  buffer_size: 2%
  byte_order: little_endian
  bg_color: 0x000000
  widgets:
    - obj:
        id: main_screen
        width: 100%
        height: 100%
        bg_color: 0x000000
        border_width: 0
        hidden: true
        widgets:
          - animimg:
              id: state_anim
              align: CENTER
              y: -50
              src: [idle_01, idle_03, idle_05, idle_07, idle_09, idle_11, idle_13]
              duration: 2600ms
              repeat_count: forever
              auto_start: true

          - obj:
              id: now_playing_info
              align: CENTER
              y: 155
              width: 90%
              height: 80
              bg_color: 0x000000
              border_width: 0
              pad_all: 0
              hidden: true
              widgets:
                - label:
                    id: now_playing_title
                    text: "Now Playing"
                    align: TOP_MID
                    y: 0
                    text_color: 0xFFFFFF
                    text_font: roboto_24
                    long_mode: SCROLL_CIRCULAR
                    width: 90%
                - label:
                    id: now_playing_artist
                    text: " "
                    align: TOP_MID
                    y: 34
                    text_color: 0xAAAAAA
                    text_font: roboto_18
                    long_mode: SCROLL_CIRCULAR
                    width: 90%

    - obj:
        id: boot_screen
        width: 100%
        height: 100%
        bg_color: 0x000000
        border_width: 0
        widgets:
          - spinner:
              id: boot_spinner
              width: 80
              height: 80
              align: CENTER
              spin_time: 1s
              arc_length: 60deg
          - label:
              id: boot_label
              text: "Initializing Hardware..."
              align: CENTER
              y: 80
              text_color: 0xFFFFFF
              text_font: roboto_24

# ------------- Controls -------------
number:
  - platform: template
    name: "Voice Assistant Volume"
    id: va_volume_slider
    min_value: 0.1
    max_value: 1.0
    step: 0.05
    optimistic: true
    initial_value: 0.75
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(board_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING && abs(x - id(board_player).volume) > 0.04;'
            then:
              - media_player.volume_set:
                  id: board_player
                  volume: !lambda "return x;"

  - platform: template
    name: "Music Volume"
    id: music_volume_slider
    min_value: 0.1
    max_value: 1.0
    step: 0.05
    optimistic: true
    initial_value: 0.45
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(board_player).state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING && abs(x - id(board_player).volume) > 0.04;'
            then:
              - media_player.volume_set:
                  id: board_player
                  volume: !lambda "return x;"

button:
  - platform: restart
    name: "Restart AI Screen"