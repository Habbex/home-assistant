esphome:
  name: waveshare-34-ai-ivy
  friendly_name: WaveShare P4 Touch LCD 4 AI 
  name_add_mac_suffix: false
  on_boot:
    priority: -100 # Runs after everything is initialized
    then:
      - script.execute: screen_idle_timer

esp32:
  board: esp32-p4
  flash_size: 32Mb
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: yes

logger:
  level: DEBUG
  logs:
    mipi_dsi: DEBUG
    lvgl: DEBUG
  hardware_uart: UART0

# Enable Home Assistant API
api:
  encryption:
    key: !secret waveshare_api

# ota:
#   - platform: esphome
#     password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp32-P4-Touch-Lcd-4C"
    password: !secret ap_pwd

esp32_hosted:
  active_high: true
  variant: ESP32C6
  # C6 reset/enable (CHIP_PU)
  reset_pin: GPIO54
  # SDIO host pins on the ESP32-P4 side (from board routing)
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17

i2c:
  sda: GPIO7
  scl: GPIO8
  scan: true
  id: bus_a

# Optional: power amp enable (active high per Waveshare)
switch:
  - platform: gpio
    pin: GPIO53
    id: pa_ctrl
    restore_mode: ALWAYS_ON

  - platform: template
    name: "Enable Wake Word"
    id: wake_word_toggle
    optimistic: true
    # Defaults to ON when the board boots
    restore_mode: RESTORE_DEFAULT_ON 
    turn_on_action:
      - micro_wake_word.start
      - logger.log: "Wake word ENABLED via Home Assistant"
    turn_off_action:
      - micro_wake_word.stop
      - logger.log: "Wake word MUTED via Home Assistant"

i2s_audio:
  id: i2s_bus
  i2s_mclk_pin: GPIO13
  i2s_bclk_pin: GPIO12
  i2s_lrclk_pin: GPIO10

audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: bus_a
    address: 0x18

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: bus_a
    address: 0x40
    sample_rate: 16000
    bits_per_sample: 16bit
    mic_gain: 12

speaker:
  - platform: i2s_audio
    id: board_speaker
    i2s_audio_id: i2s_bus
    dac_type: external
    i2s_dout_pin: GPIO9 
    channel: stereo
    audio_dac: es8311_dac
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 16000 # Locked to 16kHz

  - platform: mixer
    id: mixing_speaker
    output_speaker: board_speaker
    source_speakers:
      - id: announcement_mixing_input
        # A short timeout ensures the speaker releases the I2S bus quickly 
        # so the microphone can take over again.
        timeout: 50ms 
      - id: media_mixing_input
        timeout: 50ms

microphone:
  - platform: i2s_audio
    id: board_mic
    i2s_audio_id: i2s_bus
    adc_type: external
    i2s_din_pin: GPIO11 
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo 
  
    # on_data:
    #   - logger.log:
    #       format: "Mic bytes: %d"
    #       args: ["x.size()"]

psram:
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V

# ---- Media player (ESPHome entity for playback) ----
media_player:
  - platform: speaker
    id: board_player
    name: "P4 Audio"
    codec_support_enabled: true
    volume_min: 0.5
    volume_max: 0.75
    volume_increment: 0.05
    
    announcement_pipeline:
      speaker: announcement_mixing_input # Pointing correctly to the mixer
      format: FLAC
      sample_rate: 16000
      num_channels: 1
      
    media_pipeline:
      speaker: media_mixing_input # Pointing correctly to the mixer
      format: FLAC
      num_channels: 1
      sample_rate: 16000

    on_idle:
      - logger.log: "Media player idle (playback finished)"
      - lvgl.animimg.update:
          id: state_anim
          src: [idle_01, idle_02]
          duration: 500ms
          repeat_count: forever
          auto_start: true
      - script.execute: restart_wakeword_safely


# ---- Voice Assistant (uses mic + media_player for replies) ----
micro_wake_word:
  id: my_wake_word
  microphone:
    microphone: board_mic
    gain_factor: 10
    channels: [1]
  stop_after_detection: true
  models:
    - model: hey_jarvis
      probability_cutoff: 0.35
      sliding_window_size: 3
  vad:
    model: github://esphome/micro-wake-word-models/models/v2/vad.json
    probability_cutoff: 0.45
    sliding_window_size: 5

  on_wake_word_detected:
    then:
      # WAKE THE SCREEN AND RESET THE TIMER
      - light.turn_on: screen_backlight
      - script.execute: screen_idle_timer

      - logger.log:
          format: "Wake word detected: %s"
          args: ["wake_word.c_str()"]
      - lvgl.animimg.update:
          id: state_anim
          src: [listening_01, listening_02]
          duration: 500ms
          repeat_count: forever
          auto_start: true
      - micro_wake_word.stop
      - delay: 250ms
      - voice_assistant.start:
          wake_word: !lambda return wake_word;

voice_assistant:
  microphone:
    microphone: board_mic
    gain_factor: 10
    channels: [1]
  media_player: board_player
  noise_suppression_level: 0
  auto_gain: 31dBFS
  volume_multiplier: 1.0

  on_client_connected:
    - logger.log: "Voice Assistant connected to Home Assistant"
    - script.execute: restart_wakeword_safely

  on_client_disconnected:
    - logger.log: "Voice Assistant disconnected from Home Assistant"
    - micro_wake_word.stop
    - lvgl.animimg.update:
        id: state_anim
        src: [idle_01, idle_02]
        duration: 500ms
        repeat_count: forever
        auto_start: true

  on_listening:
    - logger.log: "Mic is listening"
    - lvgl.animimg.update:
        id: state_anim
        src: [listening_01, listening_02]
        duration: 500ms
        repeat_count: forever
        auto_start: true

  on_stt_end:
    - logger.log:
        format: "STT heard: %s"
        args: ["x.c_str()"]

  on_tts_start:
    - logger.log:
        format: "TTS text: %s"
        args: ["x.c_str()"]
    - micro_wake_word.stop
    - lvgl.animimg.update:
        id: state_anim
        src: [responding_01, responding_02]
        duration: 400ms
        repeat_count: forever
        auto_start: true

  on_end:
    - script.execute: screen_idle_timer
    - lvgl.animimg.update:
        id: state_anim
        src: [idle_01, idle_02]
        duration: 500ms
        repeat_count: forever
        auto_start: true
    - delay: 250ms

  on_error:
    - logger.log:
        format: "VA error %d: %s"
        args: ["code", "message.c_str()"]
    - lvgl.animimg.update:
        id: state_anim
        src: [idle_01, idle_02]
        duration: 500ms
        repeat_count: forever
        auto_start: true
    - delay: 250ms
    - script.execute: restart_wakeword_safely

script:
  - id: restart_wakeword_safely
    mode: restart
    then:
      - delay: 500ms
      - if:
          condition:
            and:
              - voice_assistant.connected
              - media_player.is_idle:
                  id: board_player
          then:
            - logger.log: "Starting wake word (bus should be free)"
            - micro_wake_word.start
          else:
            - logger.log: "Wake word start delayed; media player not idle"
            - delay: 500ms
            - script.execute: restart_wakeword_safely
  - id: screen_idle_timer
    mode: restart
    then:
      - delay: 5min
      - light.turn_off: screen_backlight
      - logger.log: "Screen idle timeout reached. Turning off display."

display:
  - platform: mipi_dsi
    id: my_display
    model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-3.4C
    rotation: 180

output:
  - platform: ledc
    pin: GPIO26
    id: display_backlight_pwm
    frequency: 1000Hz
    inverted: true

light:
  - platform: monochromatic
    output: display_backlight_pwm
    name: "Screen Brightness"
    id: screen_backlight
    restore_mode: ALWAYS_ON

image:
  defaults:
    type: rgb565
    byte_order: little_endian
    transparency: alpha_channel
    resize: 600x600

  images:
    - file: "WS-Speaker-Box/Assets/idle-01.png"
      id: idle_01

    - file: "WS-Speaker-Box/Assets/idle-02.png"
      id: idle_02

    - file: "WS-Speaker-Box/Assets/listening-01.png"
      id: listening_01

    - file: "WS-Speaker-Box/Assets/listening-02.png"
      id: listening_02

    - file: "WS-Speaker-Box/Assets/responding-01.png"
      id: responding_01

    - file: "WS-Speaker-Box/Assets/responding-02.png"
      id: responding_02

# REQUIRED for LVGL text in ESPHome
font:
  - file: "gfonts://Roboto"
    id: roboto_48
    size: 48

lvgl:
  displays:
    - my_display
  buffer_size: 25%
  byte_order: little_endian
  bg_color: 0x000000
  widgets:
    - animimg:
        id: state_anim
        x: 0
        y: 0
        align: CENTER
        src: [idle_01, idle_02]
        duration: 500ms
        repeat_count: forever

#-------------Controls-----------------------------
number:
  - platform: template
    name: "Voice Assistant Volume"
    id: va_volume_slider
    min_value: 0.1
    max_value: 1.0
    step: 0.05
    optimistic: true
    initial_value: 0.75
    on_value:
      then:
        - media_player.volume_set:
            id: board_player
            volume: !lambda "return x;"

button:
  - platform: restart
    name: "Restart AI Screen"

