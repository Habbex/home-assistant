    id: my_display
    model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-3.4C
    rotation: 180

output:
  - platform: ledc
    pin: GPIO26
    id: display_backlight_pwm
    frequency: 1000Hz
    inverted: true

light:
  - platform: monochromatic
    output: display_backlight_pwm
    name: "Screen Brightness"
    id: screen_backlight
    restore_mode: ALWAYS_ON

