# REQUIRED for LVGL text in ESPHome
font:
  - file: "gfonts://Roboto"
    id: roboto_48
    size: 48
  - file: "gfonts://Roboto"
    id: roboto_24
    size: 24

lvgl:
  displays:
    - my_display
  buffer_size: 5%
  byte_order: little_endian
  bg_color: 0x000000
  widgets:
    # ---- 1. THE MAIN UI (Hidden at boot) ----
    - obj:
        id: main_screen
        width: 100%
        height: 100%
        bg_color: 0x000000
        border_width: 0
        hidden: true # 
        widgets:
          - animimg:
              id: state_anim
              x: 0
              y: 0
              align: CENTER
              src: [idle_01, idle_03]#,  idle_05,  idle_07,  idle_09,  idle_11,  idle_13]
              duration: 2600ms
              repeat_count: forever
              auto_start: true

    # ---- 2. THE BOOT UI (Visible at boot) ----
    - obj:
        id: boot_screen
        width: 100%
        height: 100%
        bg_color: 0x000000
        border_width: 0
        widgets:
          - spinner:
              id: boot_spinner
              width: 80
              height: 80
              align: CENTER
              spin_time: 1s       
              arc_length: 60deg
          - label:
              id: boot_label
              text: "Initializing Hardware..."
              align: CENTER
              y: 80 # Pushes the text 80 pixels below the spinner
              text_color: 0xFFFFFF
              text_font: roboto_24

#-------------Controls-----------------------------
number:
  - platform: template
    name: "Voice Assistant Volume"
    id: va_volume_slider
    min_value: 0.1
    max_value: 1.0
    step: 0.05
    optimistic: true
    initial_value: 0.75
    on_value:
      then:
        - media_player.volume_set:
            id: board_player
            volume: !lambda "return x;"

button:
  - platform: restart
    name: "Restart AI Screen"

