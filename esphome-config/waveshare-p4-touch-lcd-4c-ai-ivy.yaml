esphome:
  name: waveshare-34-ai-ivy
  friendly_name: WaveShare P4 Touch LCD 4 AI 
  name_add_mac_suffix: false
  on_boot:
      priority: -100 # This ensures it runs last, after HA is fully connected
      then:
        # 1. Show the final success text
        - lvgl.label.update:
            id: boot_label
            text: "System Ready!"
        
        # 2. Wait 1 second so you can actually read the success message
        - delay: 1s 
        
        # 3. Hide the boot screen
        - lvgl.widget.update:
            id: boot_screen
            hidden: true
            
        # 4. Reveal the idle animation
        - lvgl.widget.update:
            id: main_screen
            hidden: false
            
        # 5. Start the idle timeout timer
        - script.execute: screen_idle_timer
    

esp32:
  board: esp32-p4
  flash_size: 32Mb
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: yes
    sdkconfig_options:
          CONFIG_ESP_SYSTEM_PANIC_PRINT_HALT: y

logger:
  level: DEBUG
  # logs:
  #   mipi_dsi: DEBUG
  #   lvgl: DEBUG
  hardware_uart: UART0

# Enable Home Assistant API
api:
  encryption:
    key: !secret waveshare_api
  on_client_connected:
      - lvgl.label.update:
          id: boot_label
          text: "Home Assistant Linked..."

# ota:
#   - platform: esphome
#     password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  on_connect:
      - lvgl.label.update:
          id: boot_label
          text: "WiFi Connected..."
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp32-P4-Touch-Lcd-4C"
    password: !secret ap_pwd

esp32_hosted:
  active_high: true
  variant: ESP32C6
  # C6 reset/enable (CHIP_PU)
  reset_pin: GPIO54
  # SDIO host pins on the ESP32-P4 side (from board routing)
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17

i2c:
  sda: GPIO7
  scl: GPIO8
  scan: false
  id: internal_i2c

# Optional: power amp enable (active high per Waveshare)
switch:
  - platform: gpio
    pin: GPIO53
    id: pa_ctrl
    restore_mode: ALWAYS_ON

  - platform: template
    name: "Enable Wake Word"
    id: wake_word_toggle
    optimistic: true
    # Defaults to ON when the board boots
    restore_mode: RESTORE_DEFAULT_ON 
    turn_on_action:
      - micro_wake_word.start
      - logger.log: "Wake word ENABLED via Home Assistant"
    turn_off_action:
      - micro_wake_word.stop
      - logger.log: "Wake word MUTED via Home Assistant"

external_components:
  - source: github://n-IA-hane/intercom-api
    components: [i2s_audio_duplex, esp_aec]

audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: internal_i2c
    address: 0x18
    bits_per_sample: 16bit
    # FORCED TO 16kHz to prevent SDIO bus crashes
    sample_rate: 16000           
    use_mclk: true
    mic_gain: 24DB

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: internal_i2c
    address: 0x40
    bits_per_sample: 16bit
    # FORCED TO 16kHz
    sample_rate: 16000           
    mic_gain: 24dB

esp_aec:
  id: aec_processor
  sample_rate: 16000
  mode: voip_low_cost
  filter_length: 4

i2s_audio_duplex:
  id: i2s_duplex
  i2s_lrclk_pin: GPIO10
  i2s_bclk_pin: GPIO12
  i2s_mclk_pin: GPIO13
  i2s_din_pin: GPIO11
  i2s_dout_pin: GPIO9
  # BOTH NATIVELY 16kHz - Completely eliminates the need for CPU-heavy resamplers
  sample_rate: 16000           
  output_sample_rate: 16000    
  aec_id: aec_processor
  use_stereo_aec_reference: true
  aec_reference_delay_ms: 80

microphone:
  - platform: i2s_audio_duplex
    id: mic_aec
    i2s_audio_duplex_id: i2s_duplex

  - platform: i2s_audio_duplex
    id: mic_raw
    i2s_audio_duplex_id: i2s_duplex
    pre_aec: true

# The Cleaned Mixer Setup (No Resamplers!)
speaker:
  - platform: i2s_audio_duplex
    id: hw_speaker
    i2s_audio_duplex_id: i2s_duplex
    sample_rate: 16000

  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 1
    source_speakers:
      - id: va_speaker_mix
        timeout: 100ms
      - id: media_speaker_mix
        timeout: 100ms

