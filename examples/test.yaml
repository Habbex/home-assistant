# ESPHome Configuration for Waveshare ESP32-P4-WIFI6-Touch-LCD-3.4C

# Must use a development version of ESPHome (e.g., 2024.12.0 or newer)
esphome:
  name: "waveshare-esp32-p4"
  # Development versions are required for ESP32-P4 support.
  # Check: https://github.com/esphome/esphome/releases
  comment: "Waveshare ESP32-P4 with 3.4-inch Touch LCD"
  project:
    name: "waveshare.esp32p4"
    version: "1.0.0"

# Platform: ESP32-P4 (Requires ESPHome dev/beta version)
esp32:
  board: esp32-p4
  # The device has both an ESP32-P4 and a separate ESP32-C6 for Wi-Fi.
  # Wi-Fi will be handled by the ESP32-C6 co-processor via SDIO.
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      # Enable support for the ESP32-C6 co-processor (Wi-Fi 6/BT5)
      CONFIG_ESP_WIFI_ENABLED: y
      CONFIG_ESP_NETIF_TCPIP_ADAPTER_COMPATIBLE_LAYER: y

# Logging and API for Home Assistant
logger:
api:
ota:

# Enable the dashboard for Over-the-Air updates
dashboard_import:

# Wi-Fi Configuration (Handled by the ESP32-C6 module)
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Enable fallback hotspot if Wi-Fi fails
  ap:
    ssid: "Waveshare-P4-Fallback"
    password: !secret fallback_password

# Essential Sensors
sensor:
  # Monitor WiFi signal strength
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

  # Device uptime
  - platform: uptime
    name: "${friendly_name} Uptime"

  # Internal memory usage
  - platform: free
    type: internal
    name: "${friendly_name} Internal Memory"

binary_sensor:
  # Status of the Wi-Fi connection
  - platform: status
    name: "${friendly_name} Status"

# Status LED (Uses the onboard power LED on GPIO2)
status_led:
  pin: GPIO2

# External PSRAM and Flash (Matches device specs)
external_components:
  - source: github://esphome/components
    components: [ esp32_p4_psram, esp32_c6_wifi ]
    refresh: 1d

memory:
  external_psram: true  # Enable the 32MB PSRAM
  external_psram_size: 32MB

# Display Configuration (SH8601 driver for the 3.4-inch 800x800 round LCD)
display:
  - platform: sh8601
    model: "3.4inch_800x800"
    data_rate: 20M
    # Pin configuration - double-check against the Waveshare schematic
    cs_pin: GPIO10
    dc_pin: GPIO11
    reset_pin: GPIO12
    backlight_pin: GPIO38
    rotation: 0  # Adjust as needed: 0, 90, 180, 270
    update_interval: 1s
    lambda: |-
      // Basic drawing example: Display device name and uptime
      it.printf(400, 300, id(font1), TextAlign::TOP_CENTER, "Waveshare P4");
      it.printf(400, 340, id(font1), TextAlign::TOP_CENTER, "Uptime: %d s", int(id(uptime_sensor).state));

font:
  - file: "gfonts://Roboto"
    id: font1
    size: 24

# Touchscreen (I2C)
i2c:
  sda: GPIO1  # Confirm these pins
  scl: GPIO2
  scan: true
  id: bus_a

touchscreen:
  - platform: gt911  # Likely touch controller
    id: touch1
    interrupt_pin: GPIO3
    reset_pin: GPIO4
    on_touch:
      then:
        lambda: |-
          // Optional: Log touch events for debugging
          ESP_LOGI("Touch", "x=%d, y=%d", x, y);